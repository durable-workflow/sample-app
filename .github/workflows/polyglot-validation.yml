name: polyglot-validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: polyglot smoke (Python/PHP)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set isolated Compose project
        shell: bash
        run: |
          raw="sample-app-polyglot-${GITHUB_RUN_ID:-local}-${GITHUB_JOB:-smoke}-${GITHUB_RUN_ATTEMPT:-1}"
          project="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_-' '-')"
          project="${project%-}"
          echo "COMPOSE_PROJECT_NAME=$project" >> "$GITHUB_ENV"
          echo "Polyglot Compose project: $project"

      - name: Resolve current artifact tuple
        shell: bash
        run: |
          while IFS= read -r assignment; do
            echo "$assignment" >> "$GITHUB_ENV"
            export "$assignment"
            printf '%s\n' "$assignment"
          done < <(scripts/resolve-current-artifacts.sh)

      - name: Show pinned server image
        working-directory: polyglot
        run: |
          # Surface the durableworkflow/server tag the smoke is about to run
          # against, so a human reviewing the CI log can immediately see which
          # server build the polyglot scenarios were exercised on. The pin
          # itself is held in docker-compose.yml; this step just prints it.
          echo "Polyglot server image pin:"
          docker compose config server | awk '/^[[:space:]]+image:/ {print; exit}'

      - name: Bring up polyglot stack
        working-directory: polyglot
        run: |
          docker compose up -d --build --wait \
            server python-activity-worker php-same-workflow-worker php-same-activity-worker php-workflow-worker php-activity-worker python-workflow-worker
          docker compose up -d --build --wait waterline

      - name: Wait for PHP worker to register on the polyglot queue
        working-directory: polyglot
        run: |
          # docker compose --wait considers a service healthy as soon as the
          # container starts when no healthcheck is defined; the PHP worker
          # then needs another moment to call registerWorker on the server.
          # Poll the log for the registration line so this step does not race.
          for attempt in $(seq 1 60); do
            if docker compose logs php-workflow-worker 2>/dev/null | grep -qF "polyglot php worker registered"; then
              echo "PHP worker registered (after ${attempt}s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PHP worker did not log polyglot registration within 60s"
          docker compose logs --tail=200 php-workflow-worker
          exit 1

      - name: Wait for PHP same-language workers to register
        working-directory: polyglot
        run: |
          for attempt in $(seq 1 60); do
            workflow_registered=0
            activity_registered=0

            if docker compose logs php-same-workflow-worker 2>/dev/null | grep -qF "polyglot php worker registered"; then
              workflow_registered=1
            fi
            if docker compose logs php-same-activity-worker 2>/dev/null | grep -qF "polyglot php activity worker registered"; then
              activity_registered=1
            fi

            if [ "$workflow_registered" -eq 1 ] && [ "$activity_registered" -eq 1 ]; then
              echo "PHP same-language workers registered (after ${attempt}s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PHP same-language workers did not both register within 60s"
          docker compose logs --tail=200 php-same-workflow-worker php-same-activity-worker
          exit 1

      - name: Wait for PHP activity worker to register on the polyglot queue
        working-directory: polyglot
        run: |
          # The Python-to-PHP scenario needs a separate PHP activity
          # worker, not the PHP workflow worker above.
          for attempt in $(seq 1 60); do
            if docker compose logs php-activity-worker 2>/dev/null | grep -qF "polyglot php activity worker registered"; then
              echo "PHP activity worker registered (after ${attempt}s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PHP activity worker did not log polyglot registration within 60s"
          docker compose logs --tail=200 php-activity-worker
          exit 1

      - name: Run polyglot smoke
        working-directory: polyglot
        run: docker compose run --rm --build smoke

      - name: Dump compose logs on failure
        if: failure()
        working-directory: polyglot
        run: docker compose logs --no-color --timestamps

      - name: Tear down stack
        if: always()
        working-directory: polyglot
        run: docker compose down -v --remove-orphans
