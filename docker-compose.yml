x-app-build: &app-build
  context: .
  args:
    DURABLE_WORKFLOW_WORKFLOW_PIN: ${DURABLE_WORKFLOW_WORKFLOW_PIN:-}
    DURABLE_WORKFLOW_WORKFLOW_VERSION: ${DURABLE_WORKFLOW_WORKFLOW_VERSION:-}
    DURABLE_WORKFLOW_WATERLINE_PIN: ${DURABLE_WORKFLOW_WATERLINE_PIN:-}
    DURABLE_WORKFLOW_WATERLINE_VERSION: ${DURABLE_WORKFLOW_WATERLINE_VERSION:-}
    SAMPLE_APP_COMMIT: ${SAMPLE_APP_COMMIT:-}

x-laravel-environment: &laravel-environment
  # Stable APP_KEY shared across every Laravel service so serialized closures
  # encrypted by one container can be decrypted by another. Local-dev only —
  # override via .env (APP_KEY=...) or the shell when running the stack.
  APP_KEY: ${APP_KEY:-base64:RnT2yvrznADdoG2WROIIFaUTmlbgNRDIFV9bqCCBWLg=}

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sample
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Probe the TCP listener (not the Unix socket) so the service is only
      # reported healthy once it can answer the same connection the app makes.
      # The socket comes up before TCP, which previously let dependents start
      # while the app's DB connection still failed with [2002] Connection refused.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "--silent"]
      interval: 5s
      retries: 30
      start_period: 15s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10

  app:
    build: *app-build
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *laravel-environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      # OPENAI_API_KEY is forwarded from the host (or workspace .env) so the
      # TravelAgent / Prism workflows can talk to OpenAI. Leave unset to skip
      # those workflows.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sample
      DB_USERNAME: laravel
      DB_PASSWORD: password
      SHARED_DB_HOST: mysql
      SHARED_DB_PORT: 3306
      SHARED_DB_DATABASE: sample
      SHARED_DB_USERNAME: laravel
      SHARED_DB_PASSWORD: password
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      DURABLE_SERVER_IMAGE: ${DURABLE_SERVER_IMAGE:-}
      DURABLE_WORKFLOW_CLI_VERSION: ${DURABLE_WORKFLOW_CLI_VERSION:-}
      DURABLE_WORKFLOW_PYTHON_SDK_VERSION: ${DURABLE_WORKFLOW_PYTHON_SDK_VERSION:-}
      DURABLE_WORKFLOW_RUST_SDK_VERSION: ${DURABLE_WORKFLOW_RUST_SDK_VERSION:-}
      DURABLE_WORKFLOW_PHP_SDK_VERSION: ${DURABLE_WORKFLOW_PHP_SDK_VERSION:-}
      DURABLE_WORKFLOW_WORKFLOW_VERSION: ${DURABLE_WORKFLOW_WORKFLOW_VERSION:-}
      DURABLE_WORKFLOW_WATERLINE_VERSION: ${DURABLE_WORKFLOW_WATERLINE_VERSION:-}
      SAMPLE_APP_COMMIT: ${SAMPLE_APP_COMMIT:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - playwright_videos:/app/videos
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/up"]
      interval: 5s
      retries: 30
      start_period: 30s

  worker:
    build: *app-build
    depends_on:
      app:
        condition: service_healthy
    environment:
      <<: *laravel-environment
      APP_ENV: local
      APP_DEBUG: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sample
      DB_USERNAME: laravel
      DB_PASSWORD: password
      SHARED_DB_HOST: mysql
      SHARED_DB_PORT: 3306
      SHARED_DB_DATABASE: sample
      SHARED_DB_USERNAME: laravel
      SHARED_DB_PASSWORD: password
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DURABLE_WORKFLOW_PHP_SDK_VERSION: ${DURABLE_WORKFLOW_PHP_SDK_VERSION:-}
      DURABLE_WORKFLOW_WORKFLOW_VERSION: ${DURABLE_WORKFLOW_WORKFLOW_VERSION:-}
      DURABLE_WORKFLOW_WATERLINE_VERSION: ${DURABLE_WORKFLOW_WATERLINE_VERSION:-}
    volumes:
      - playwright_videos:/app/videos
    command: php artisan queue:work redis --queue=default,activity --tries=3 --timeout=60

  seed:
    build: *app-build
    depends_on:
      app:
        condition: service_healthy
    environment:
      <<: *laravel-environment
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: sample
      DB_USERNAME: laravel
      DB_PASSWORD: password
      REDIS_HOST: redis
      SHARED_DB_HOST: mysql
      SHARED_DB_PORT: 3306
      SHARED_DB_DATABASE: sample
      SHARED_DB_USERNAME: laravel
      SHARED_DB_PASSWORD: password
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    command: php artisan db:seed --force
    profiles:
      - seed

volumes:
  mysql_data:
  redis_data:
  playwright_videos:
